models:
  - name: dim_listings_cleansed
    description: Cleansed table which contains Airbnb listings.
    data_tests:
      - minimum_row_count:
          # passing arguments
          arguments:
            min_row_count: 1000
          # don't fail the test
          config:
            severity: error
    columns:
      - name: listing_id
        description: Primary key for the listing.
        data_tests:
          - unique
          - not_null
      - name: host_id
        description: The hosts's id. References the host table.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id
      - name: room_type
        description: Type of the apartment / room.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - "Entire home/apt"
                  - "Private room"
                  - "Shared room"
                  - "Hotel room"
      - name: minimum_nights
        # jinja syntax to refer to document defined in another md file
        description: '{{ doc("dim_listing_cleansed__minimum_nights") }}'
        data_tests:
          - positive_values
  - name: dim_hosts_cleansed
    description: replace empty hosts name with a value
    config:
      contract:
        enforced: true
    columns:
      - name: host_id
        data_type: integer
        tests:
          - not_null
          - unique
      - name: host_name
        data_type: string
        tests:
          - not_null
      - name: is_superhost
        data_type: string
        tests:
          - accepted_values:
              arguments:
                values: ['t', 'f']
      - name: updated_at
        data_type: timestamp
      - name: created_at
        data_type: timestamp
